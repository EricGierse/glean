<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glean — Expense Report</title>
  <style>
    :root { --ink: #0f1720; --muted: #5b6573; --faint: #8a94a2; --line: #e6e9ee; --accent: #0a9b70; --soft: #e9fbf3; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--ink); background: #f4f6f8; padding: 32px 20px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .sheet { max-width: 760px; margin: 0 auto; background: #fff; border-radius: 14px; box-shadow: 0 12px 40px -16px rgba(10,40,30,.25); padding: 34px 36px; }

    .toolbar { max-width: 760px; margin: 0 auto 16px; display: flex; gap: 10px; align-items: center; }
    .toolbar .sp { flex: 1; }
    .btn { font: inherit; font-weight: 650; font-size: 14px; padding: 9px 16px; border-radius: 10px; border: 1px solid var(--line); background: #fff; color: var(--ink); cursor: pointer; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

    header { display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 2px solid var(--ink); padding-bottom: 18px; margin-bottom: 22px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand .logo { width: 30px; height: 30px; border-radius: 8px; }
    .brand .name { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
    .brand .name b { color: var(--accent); }
    .doc-title { text-align: right; }
    .doc-title h1 { font-size: 17px; font-weight: 800; }
    .doc-title .sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat { border: 1px solid var(--line); border-radius: 11px; padding: 14px 15px; }
    .stat .l { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--faint); font-weight: 700; }
    .stat .v { font-size: 22px; font-weight: 800; letter-spacing: -.02em; margin-top: 4px; }

    h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--faint); margin: 22px 0 10px; }
    .cats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .cat { display: flex; align-items: center; gap: 7px; font-size: 12.5px; border: 1px solid var(--line); border-radius: 999px; padding: 5px 11px; }
    .cat .dot { width: 9px; height: 9px; border-radius: 50%; }
    .cat b { font-weight: 700; }

    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    thead th { text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--faint); border-bottom: 1.5px solid var(--line); padding: 8px 8px; }
    tbody td { padding: 9px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
    tbody tr:nth-child(even) { background: #fafbfc; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .merch { font-weight: 650; }
    .pill { display: inline-flex; align-items: center; gap: 6px; }
    .pill .dot { width: 8px; height: 8px; border-radius: 50%; }
    tfoot td { padding: 12px 8px; font-weight: 800; border-top: 2px solid var(--ink); font-size: 13.5px; }

    footer { margin-top: 26px; padding-top: 14px; border-top: 1px solid var(--line); font-size: 11px; color: var(--faint); display: flex; justify-content: space-between; }

    @media print {
      body { background: #fff; padding: 0; }
      .toolbar { display: none; }
      .sheet { box-shadow: none; border-radius: 0; max-width: none; padding: 0; }
      tbody tr { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="sp"></span>
    <button class="btn" id="closeBtn">Close</button>
    <button class="btn primary" id="printBtn">Print / Save as PDF</button>
  </div>

  <div class="sheet">
    <header>
      <div class="brand">
        <img class="logo" src="icons/logo.svg" alt="" />
        <span class="name">Glean</span>
      </div>
      <div class="doc-title">
        <h1>Expense Report</h1>
        <div class="sub" id="docRange">—</div>
      </div>
    </header>

    <div class="summary">
      <div class="stat"><div class="l">Total spend</div><div class="v" id="sTotal">—</div></div>
      <div class="stat"><div class="l">Receipts</div><div class="v" id="sCount">—</div></div>
      <div class="stat"><div class="l">Total tax</div><div class="v" id="sTax">—</div></div>
    </div>

    <h2>By category</h2>
    <div class="cats" id="cats"></div>

    <h2>Receipts</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th><th>Merchant</th><th>Category</th>
          <th class="num">Tax</th><th class="num">Amount</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
      <tfoot>
        <tr><td colspan="4">Total</td><td class="num" id="fTotal">—</td></tr>
      </tfoot>
    </table>

    <footer>
      <span id="genAt">Generated by Glean</span>
      <span>glean — never lose a receipt again</span>
    </footer>
  </div>

  <script type="module" src="report.js"></script>
</body>
</html>
