<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Glean">
  <defs>
    <linearGradient id="g-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3BE3A0"/>
      <stop offset="0.55" stop-color="#12B981"/>
      <stop offset="1" stop-color="#0A9B70"/>
    </linearGradient>
    <radialGradient id="g-sheen" cx="0.28" cy="0.2" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#E9FBF3"/>
    </linearGradient>
    <filter id="f-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3.5" stdDeviation="3.4" flood-color="#063b2b" flood-opacity="0.24"/>
    </filter>
    <filter id="f-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App tile -->
  <rect width="128" height="128" rx="30" fill="url(#g-bg)"/>
  <rect width="128" height="128" rx="30" fill="url(#g-sheen)"/>

  <!-- Receipt with a torn bottom edge -->
  <g filter="url(#f-soft)">
    <path d="M40 37
             a7 7 0 0 1 7 -7 H79 a7 7 0 0 1 7 7
             V90
             L82.17 95 L78.33 90 L74.5 95 L70.67 90 L66.83 95 L63 90 L59.17 95 L55.33 90 L51.5 95 L47.67 90 L43.83 95 L40 90 Z"
          fill="url(#g-paper)"/>
  </g>
  <!-- Receipt lines -->
  <g fill="#0FA876">
    <rect x="48" y="45" width="22" height="6.2" rx="3.1"/>
    <rect x="48" y="58" width="30" height="6.2" rx="3.1"/>
    <rect x="48" y="71" width="16" height="6.2" rx="3.1" opacity="0.55"/>
  </g>

  <!-- AI sparkle -->
  <path d="M94 26
           C95.7 35 98 37.3 107 39
           C98 40.7 95.7 43 94 52
           C92.3 43 90 40.7 81 39
           C90 37.3 92.3 35 94 26 Z"
        fill="#fff" filter="url(#f-glow)"/>
  <circle cx="82" cy="59" r="2.8" fill="#fff" opacity="0.9"/>
</svg>
